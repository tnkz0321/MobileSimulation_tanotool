<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>スマホ料金シミュレーター</title>
    <!-- デザインライブラリ -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React本体 -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- プログラムを動かすための翻訳機 -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body class="bg-slate-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        // Reactの機能を準備
        const { useState } = React;

        function MobileFeeSimulator() {
            const [selectedCarrierA, setSelectedCarrierA] = useState('ドコモ');
            const [selectedCarrierB, setSelectedCarrierB] = useState('au');
            const [deviceA, setDeviceA] = useState(0);
            const [deviceB, setDeviceB] = useState(0);
            const [planA, setPlanA] = useState(0);
            const [planB, setPlanB] = useState(0);
            const [showResults, setShowResults] = useState(false);

            const MONTHS = 23;
            const totalA = (Number(deviceA) + Number(planA)) * MONTHS;
            const totalB = (Number(deviceB) + Number(planB)) * MONTHS;
            const savings = totalA - totalB;

            return (
                <div className="min-h-screen pb-10 font-sans">
                    <header className="bg-white border-b py-6 text-center shadow-sm">
                        <h1 className="text-xl font-bold">スマホ料金シミュレーター</h1>
                    </header>

                    <main className="max-w-md mx-auto px-4 mt-8 space-y-6">
                        {!showResults ? (
                            <div className="space-y-6">
                                <div className="bg-white p-6 rounded-3xl border shadow-sm space-y-4">
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-xs font-bold text-slate-400 block mb-2">現在のキャリア</label>
                                            <select value={selectedCarrierA} onChange={(e) => setSelectedCarrierA(e.target.value)} className="w-full p-3 border rounded-xl bg-slate-50">
                                                <option>ドコモ</option><option>au</option><option>ソフトバンク</option><option>Y!mobile</option><option>UQmobile</option><option>ahamo</option>
                                            </select>
                                        </div>
                                        <div>
                                            <label className="text-xs font-bold text-indigo-600 block mb-2">乗り換え後</label>
                                            <select value={selectedCarrierB} onChange={(e) => setSelectedCarrierB(e.target.value)} className="w-full p-3 border-2 border-indigo-500 rounded-xl">
                                                <option>ドコモ</option><option>au</option><option>ソフトバンク</option><option>Y!mobile</option><option>UQmobile</option><option>ahamo</option>
                                            </select>
                                        </div>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border shadow-sm space-y-6">
                                    <div className="space-y-4">
                                        <p className="text-sm font-bold border-l-4 border-slate-300 pl-2">月々のスマホ代（端末分割金）</p>
                                        <input type="number" placeholder={`${selectedCarrierA}の金額`} onChange={(e) => setDeviceA(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl" />
                                        <input type="number" placeholder={`${selectedCarrierB}の金額`} onChange={(e) => setDeviceB(e.target.value)} className="w-full p-4 border-2 border-indigo-50 shadow-inner rounded-2xl" />
                                    </div>
                                    <div className="space-y-4">
                                        <p className="text-sm font-bold border-l-4 border-slate-300 pl-2">月々のプラン料金（通信料）</p>
                                        <input type="number" placeholder={`${selectedCarrierA}の金額`} onChange={(e) => setPlanA(e.target.value)} className="w-full p-4 bg-slate-50 border rounded-2xl" />
                                        <input type="number" placeholder={`${selectedCarrierB}の金額`} onChange={(e) => setPlanB(e.target.value)} className="w-full p-4 border-2 border-indigo-50 shadow-inner rounded-2xl" />
                                    </div>
                                </div>

                                <button onClick={() => setShowResults(true)} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black text-xl shadow-xl active:scale-95 transition-transform">
                                    結果を見る
                                </button>
                            </div>
                        ) : (
                            <div className="space-y-6">
                                <div className="bg-slate-900 p-8 rounded-[2.5rem] text-white relative shadow-2xl">
                                    <p className="text-indigo-300 font-bold mb-2">23ヶ月のお得額 合計</p>
                                    <div className="flex items-baseline gap-2">
                                        <span className="text-5xl font-black italic">¥{savings.toLocaleString()}</span>
                                        <span className="text-lg font-bold">お得！</span>
                                    </div>
                                </div>

                                <div className="bg-white p-6 rounded-3xl border shadow-sm">
                                    <p className="font-bold mb-8 text-sm text-center italic">4年間の返却スケジュール図</p>
                                    <div className="relative h-3 w-full bg-slate-100 rounded-full mb-10">
                                        <div className="absolute h-full w-1/2 bg-indigo-500 rounded-l-full"></div>
                                        <div className="absolute left-1/2 -top-2 translate-x-[-50%]">
                                            <div className="w-1 h-8 bg-rose-500"></div>
                                            <p className="absolute -bottom-8 left-1/2 -translate-x-1/2 whitespace-nowrap text-[10px] font-bold text-rose-600">23ヶ月目で返却</p>
                                        </div>
                                    </div>
                                </div>

                                <button onClick={() => setShowResults(false)} className="w-full py-4 text-slate-400 font-bold">← 入力に戻る</button>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        // 画面に表示する
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MobileFeeSimulator />);
    </script>
</body>
</html>
